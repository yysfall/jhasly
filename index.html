<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    overflow:hidden;

    padding:20px;

    background:
    linear-gradient(
        rgba(0,18,0,0.95),
        rgba(0,18,0,0.95)
    ),
    url("texture.png");

    background-blend-mode:multiply;

    background-size:cover;
    background-repeat:repeat;
    background-attachment:fixed;

    color:white;

    font-family:Arial, Helvetica, sans-serif;

    text-align:center;
}

/* TITLE */

h1{
    margin-bottom:clamp(20px, 4vw, 40px);

    font-size:clamp(22px, 5vw, 42px);

    letter-spacing:clamp(2px, 1vw, 4px);

    opacity:0.8;
}

/* CAKE BUTTON */

#cake{
    position:relative;

    width:clamp(180px, 30vw, 220px);
    height:clamp(150px, 25vw, 180px);

    cursor:pointer;

    transition:0.4s ease;
}

#cake:hover{
    transform:scale(1.05);
}

/* CAKE BASE */

.cake-base{
    position:absolute;

    bottom:0;

    width:100%;
    height:clamp(90px, 16vw, 120px);

    background:#f4eee0;

    border-radius:20px;

    box-shadow:
    0 20px 40px rgba(0,0,0,0.3);
}

/* FROSTING */

.frosting{
    position:absolute;

    top:-15px;

    width:100%;
    height:clamp(28px, 5vw, 40px);

    background:#d8c59f;

    border-radius:20px;
}

/* CANDLES */

.candles{
    position:absolute;

    top:clamp(-55px, -7vw, -70px);
    left:0;

    width:100%;

    display:flex;
    justify-content:space-evenly;

    align-items:flex-end;
}

.candle{
    position:relative;

    width:clamp(10px, 1.5vw, 14px);
    height:clamp(40px, 8vw, 60px);

    background:#f4eee0;

    border-radius:10px;
}

/* FLAME */

.flame{
    position:absolute;

    top:clamp(-15px, -2vw, -18px);
    left:50%;

    transform:translateX(-50%);

    width:clamp(12px, 2vw, 16px);
    height:clamp(16px, 2.5vw, 20px);

    background:#ffd36b;

    border-radius:50%;

    box-shadow:
    0 0 20px #ffd36b;

    animation:flicker 1.5s infinite;
}

@keyframes flicker{

    0%{
        transform:translateX(-50%) scale(1);
    }

    50%{
        transform:translateX(-50%) scale(1.1);
    }

    100%{
        transform:translateX(-50%) scale(1);
    }
}

/* TEXT */

p{
    margin-top:clamp(20px, 4vw, 30px);

    opacity:0.6;

    letter-spacing:2px;

    font-size:clamp(14px, 2vw, 18px);

    max-width:90%;
}

/* TABLET */

@media (max-width: 768px){

    body{
        padding:30px;
    }

    p{
        line-height:1.6;
    }

}

/* MOBILE */

@media (max-width: 480px){

    h1{
        width:90%;
    }

    #cake{
        width:170px;
        height:140px;
    }

    p{
        width:90%;
    }

}

</style>
</head>

<body>

<h1>Happy Birthday!!</h1>

<div id="cake">

    <div class="cake-base">

        <div class="frosting"></div>

        <div class="candles">

            <div class="candle">
                <div class="flame"></div>
            </div>

            <div class="candle">
                <div class="flame"></div>
            </div>

            <div class="candle">
                <div class="flame"></div>
            </div>

        </div>

    </div>

</div>

<p>
    Make a wish before you click the cake
</p>

<script>

const cake = document.getElementById("cake");

cake.addEventListener("click", () => {

    window.location.href = "jen.html";

});

</script>

</body>
</html>
